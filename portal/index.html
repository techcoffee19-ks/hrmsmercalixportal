<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mercalix Terminal | Biometric Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        :root { --primary: #ffb100; --dark: #0f172a; --wfh: #a855f7; }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: #e2e8f0; margin: 0; padding: 0; min-height: 100vh; overflow-y: auto; }
        
        .top-nav { width: 100%; height: 60px; padding: 0 24px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-size: 18px; font-weight: 800; color: white; text-decoration: none; letter-spacing: 1px; }
        .logo-text span { color: var(--primary); }
        
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .scanner-line { height: 4px; background: var(--primary); width: 100%; position: absolute; top: 0; box-shadow: 0 0 25px var(--primary); animation: scan 2s infinite ease-in-out; z-index: 30; }
        .scanner-line.wfh-active { background: var(--wfh) !important; box-shadow: 0 0 25px var(--wfh) !important; }
        
        @keyframes scan { 0%, 100% { top: 5%; opacity: 0.2; } 50% { top: 95%; opacity: 1; } }
        #video-feed { transform: scaleX(-1); border-radius: 1.5rem; object-fit: cover; }
        .btn-punch { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-bottom-width: 4px; }
        .btn-punch:active { transform: translateY(2px); border-bottom-width: 0px; }

        .terminal-flex-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            padding: 15px; 
            box-sizing: border-box;
            width: 100%;
            max-width: 480px; 
            margin: 0 auto;
        }
        .camera-surface-view { width: 100%; aspect-ratio: 4/3; position: relative; }
        
        @media (max-height: 700px) {
            .camera-surface-view { height: 30vh; }
            .btn-punch { py: 2px !important; font-size: 1rem !important; }
        }
    </style>
</head>
<body class="flex flex-col">

    <nav class="top-nav">
        <a href="#" class="logo-text">MERCALIX <span>SYSTEM</span></a>
        <div class="flex items-center gap-3">
            <div id="clock" class="text-white font-bold text-xs bg-slate-800 px-3 py-1 rounded-full border border-slate-700">--:--:--</div>
            <a href="login.html" class="text-[9px] font-black text-amber-500 border border-amber-500 px-3 py-1 rounded-lg hover:bg-amber-500 hover:text-black transition-all">ADMIN ACCESS</a>
        </div>
    </nav>

    <main class="terminal-flex-container">
        <div class="text-center w-full mt-2">
            <p id="cloud-status" class="text-amber-500 text-[9px] font-black uppercase tracking-[0.2em] mb-0.5">Neural Pulse: Initialising...</p>
            <h2 class="text-xl font-black text-white tracking-tighter uppercase">ATTENDANCE <span class="text-slate-400">TERMINAL</span></h2>
        </div>

        <div class="camera-surface-view glass-panel rounded-[2rem] p-2 border border-white/5 shadow-2xl overflow-hidden">
            <div id="scanner-line" class="scanner-line hidden"></div>
            <div id="scan-overlay" class="absolute inset-0 z-20 pointer-events-none flex items-center justify-center p-3">
                <div id="overlay-msg" class="px-6 py-3 rounded-2xl border-2 hidden text-xs font-black shadow-2xl backdrop-blur-2xl uppercase tracking-widest text-center text-white"></div>
            </div>
            <video id="video-feed" autoplay playsinline class="w-full h-full bg-slate-900 opacity-40 transition-opacity duration-300"></video>
            <canvas id="capture-canvas" width="640" height="480" class="hidden"></canvas>
            
            <div id="setup-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/95 z-40 p-4">
                <div id="ai-loader" class="w-9 h-9 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <button id="cam-init-btn" disabled onclick="startCamera()" class="bg-amber-500 text-slate-950 px-8 py-3 rounded-xl font-black disabled:opacity-30 uppercase text-[9px] tracking-widest">Initialise Biometric Link</button>
            </div>
        </div>

        <div class="w-full glass-panel p-3 rounded-xl border border-white/5 flex flex-col gap-2">
            <div class="flex items-center justify-between gap-4">
                <label class="text-[9px] font-black tracking-widest text-slate-400 uppercase">Select Attendance Location Mode</label>
                <select id="dutyLocationMode" onchange="toggleDutyLocationModeView()" class="bg-slate-900 border border-slate-700 text-amber-400 font-bold text-xs rounded-md px-2 py-1 focus:outline-none focus:border-amber-500">
                    <option value="OFFICE">🏢 Office Base (Default)</option>
                    <option value="WFH">🏠 Work From Home (WFH)</option>
                </select>
            </div>
            
            <div id="wfhReasonContainer" class="hidden flex-col gap-1 border-t border-white/5 pt-2">
                <label class="text-[9px] font-black tracking-widest text-purple-400 uppercase">Reason for Work From Home *</label>
                <input type="text" id="wfhReasonInput" placeholder="Enter reason here..." class="w-full bg-slate-950/80 border border-purple-500/30 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-purple-500 font-medium">
            </div>
        </div>

        <div class="flex gap-4 w-full">
            <button onclick="triggerPunch('IN')" class="btn-punch flex-1 bg-emerald-500 text-emerald-950 font-black py-3 rounded-2xl text-lg border-emerald-700 shadow-xl tracking-wide">PUNCH IN</button>
            <button onclick="triggerPunch('OUT')" class="btn-punch flex-1 bg-rose-500 text-rose-950 font-black py-3 rounded-2xl text-lg border-rose-700 shadow-xl tracking-wide">PUNCH OUT</button>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCkBeHploRe3UHq6ndukFUtfYc8sCkfx9g",
            authDomain: "hrmsmercalixportal.firebaseapp.com",
            projectId: "hrmsmercalixportal",
            storageBucket: "hrmsmercalixportal.firebasestorage.app",
            messagingSenderId: "126979860674",
            appId: "1:126979860674:web:f486ad4b470b59189c735b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let biometricRegistry = []; 
        let activeStream = null;
        let terminalCC = sessionStorage.getItem("companyCode") || localStorage.getItem("terminalCC") || "GENERAL";
        if(terminalCC !== "GENERAL") localStorage.setItem("terminalCC", terminalCC);

        const video = document.getElementById('video-feed');
        const canvas = document.getElementById('capture-canvas');

        function toggleDutyLocationModeView() {
            const mode = document.getElementById("dutyLocationMode").value;
            const container = document.getElementById("wfhReasonContainer");
            if(mode === "WFH") {
                container.classList.remove("hidden"); container.classList.add("flex");
            } else {
                container.classList.add("hidden"); container.classList.remove("flex");
                document.getElementById("wfhReasonInput").value = "";
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
            
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                document.getElementById('ai-loader').classList.add('hidden');
                document.getElementById('cam-init-btn').disabled = false;
                
                let query = db.collection("vc_biometrics");
                if (terminalCC !== "GENERAL") {
                    query = query.where("companyCode", "==", terminalCC);
                }

                query.onSnapshot(snap => {
                    biometricRegistry = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    document.getElementById('cloud-status').innerText = `SYSTEM READY: ${biometricRegistry.length} IDENTITIES MAPPED`;
                });
            } catch (e) { 
                document.getElementById('cloud-status').innerText = "BIOMETRIC NETWORK RETRYING...";
                console.error("Models failed to load from primary repository.", e);
            }
        });

        async function startCamera() {
            try { 
                activeStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
                }); 
                video.srcObject = activeStream; 
                video.classList.replace('opacity-40', 'opacity-100');
                document.getElementById('setup-screen').classList.add('hidden'); 
            } catch (e) { alert("Camera connection error. Check browser tab security permissions."); }
        }

        async function getAddressFromCoords(lat, lng) {
            if(!lat || lat === 0) return "Manual Punch / Location Secured";
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await res.json();
                return data.display_name || "Office Headquarter Hub";
            } catch (e) { return `${lat}, ${lng}`; }
        }

        async function triggerPunch(type) {
            if (!activeStream) return alert("Initialize Biometric Link First.");
            const line = document.getElementById('scanner-line');
            const mode = document.getElementById("dutyLocationMode").value;
            const wfhReason = document.getElementById("wfhReasonInput").value;

            if (mode === "WFH" && !wfhReason.trim()) {
                return alert("⚠️ Reason required! Please fill in why you are working from home before scanning.");
            }

            if (mode === "WFH") line.classList.add("wfh-active");
            else line.classList.remove("wfh-active");

            updateUI("MATCHING INDENTITIES VECTORS...<br><span class='text-[9px] text-amber-500'>AI RESOLUTION ENGINE: SUB-2 SEC TIMING INTERACTION</span>", "bg-slate-900 border-amber-500/50");
            line.classList.remove('hidden');

            try {
                const faceOptions = new faceapi.TinyFaceDetectorOptions({ inputSize: 128, scoreThreshold: 0.4 });
                const detection = await faceapi.detectSingleFace(video, faceOptions).withFaceLandmarks().withFaceDescriptor();
                
                if (!detection) {
                    line.classList.add('hidden');
                    return updateUI("FACE CONTOUR PROFILE OUT OF ZONE", "bg-rose-600");
                }

                let bestMatch = null;
                let minDistance = 0.45;

                biometricRegistry.forEach(user => {
                    const dist = faceapi.euclideanDistance(detection.descriptor, new Float32Array(user.descriptor));
                    if (dist < minDistance) { minDistance = dist; bestMatch = user; }
                });

                if (bestMatch) {
                    // Safe Override: Permission block hone par bhi lat: 0 aur lng: 0 ke saath continuous execution karega
                    const coords = await new Promise((resolve) => {
                        navigator.geolocation.getCurrentPosition(
                            (p) => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
                            (e) => resolve({ lat: 0, lng: 0 }), 
                            { enableHighAccuracy: false, timeout: 3000 } 
                        );
                    });

                    const todayStr = new Date().toLocaleDateString('en-GB').replace(/\//g, '-');
                    const logsSnap = await db.collection("vc_logs")
                        .where("id", "==", String(bestMatch.id))
                        .where("date", "==", todayStr)
                        .get();

                    let allLogs = [];
                    logsSnap.forEach(doc => allLogs.push(doc.data()));
                    allLogs.sort((a, b) => b.timestamp - a.timestamp);
                    
                    const lastLog = allLogs[0]; 
                    const lastType = lastLog ? lastLog.type : null;

                    if (type === "IN" && lastType === "IN") {
                        line.classList.add('hidden');
                        return updateUI(`ALREADY PUNCHED IN<br><span class='text-[9px] text-amber-500'>CLOSE PRESENT SEED LIFECYCLE FIRST</span>`, "bg-amber-600");
                    } 
                    if (type === "OUT" && (!lastType || lastType === "OUT")) {
                        line.classList.add('hidden');
                        return updateUI(`PUNCH IN FIRST<br><span class='text-[9px] text-amber-500'>NO CHECK-IN SIGNATURE LOGGED TODAY</span>`, "bg-amber-600");
                    }

                    updateUI(`PROFILE MATCHED: ${bestMatch.name.toUpperCase()}<br><span class='text-[9px] text-emerald-400'>SYNCHRONIZING DIRECT TRANSACTION STREAMS...</span>`, "bg-slate-900 border-emerald-500/50");
                    
                    let addr = "Manual Punch / Location Secured";
                    if (mode === "WFH") {
                        addr = "Remote Home Log";
                    } else if (coords.lat !== 0) {
                        addr = await getAddressFromCoords(coords.lat, coords.lng);
                    }
                    
                    await finalizePunch(bestMatch, type, coords.lat, coords.lng, addr, mode, wfhReason);

                } else {
                    line.classList.add('hidden');
                    updateUI("UNKNOWN VECTORS SYSTEM LOCK", "bg-rose-700");
                }
            } catch (err) { 
                console.error(err); updateUI("PIPELINE DROPPED - RETRY", "bg-slate-800"); 
            } finally {
                line.classList.add('hidden');
            }
        }

        async function finalizePunch(user, type, lat, lng, addr, mode, wfhReason) {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB').replace(/\//g, '-');
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });

            let isLate = false;
            let punchStatus = "ON TIME";
            const officeDeadline = 10.0; 

            if (type === "IN" && mode !== "WFH") {
                const currentTimeDecimal = now.getHours() + (now.getMinutes() / 60);
                if (currentTimeDecimal > officeDeadline) { 
                    isLate = true; 
                    punchStatus = "LATE MARK"; 
                }
            }
            
            if (mode === "WFH") {
                punchStatus = "AWAITING ADMIN REVIEW";
            }
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            const photoData = canvas.toDataURL('image/jpeg', 0.15); 

            try {
                await db.collection("vc_logs").add({
                    id: String(user.id), 
                    empId: String(user.id), 
                    name: String(user.name),
                    companyCode: String(user.companyCode || terminalCC),
                    type: String(type),
                    date: String(dateStr),
                    time: String(timeStr),
                    late: isLate,
                    status: punchStatus,
                    photo: photoData,
                    lat: Number(lat),
                    lng: Number(lng),
                    location: mode === "WFH" ? "Work From Home" : String(addr),
                    locationTag: lat === 0 ? "Manual/Bypassed" : "GPS Verified",
                    isWFH: mode === "WFH",
                    wfhReason: mode === "WFH" ? String(wfhReason) : "",
                    wfhStatus: mode === "WFH" ? "Pending" : "Approved", 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                const uiColor = mode === "WFH" ? "bg-purple-600" : (isLate ? "bg-orange-500" : "bg-emerald-500");
                const uiMsg = mode === "WFH" ? 
                    `WFH REQUEST FILED: ${user.name.toUpperCase()}<br><span style="font-size:10px;">STATUS WILL SYNC POST ADMIN APPROVAL ACTION</span>` :
                    `ACCESS CLEAR: ${user.name.toUpperCase()}<br><span style="font-size:11px;">ATTENDANCE COMPLETED AS ${punchStatus} ${lat === 0 ? '(GPS OVERRIDDEN)' : ''}</span>`;
                
                updateUI(uiMsg, uiColor);
            } catch (e) { updateUI("FIRESTORE REJECTION DROPPED", "bg-rose-800"); }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key.toUpperCase() === 'I') triggerPunch('IN');
            if (e.key.toUpperCase() === 'O') triggerPunch('OUT');
        });

        function updateUI(txt, cls) {
            const el = document.getElementById('overlay-msg');
            el.innerHTML = txt;
            el.className = `${cls} text-white px-5 py-3 rounded-2xl border-2 block text-center shadow-2xl backdrop-blur-md z-50`;
            el.classList.remove('hidden');
            if(!txt.includes("MATCHING") && !txt.includes("SYNCHRONIZING")) setTimeout(() => el.classList.add('hidden'), 2300);
        }
    </script>
</body>
</html>
