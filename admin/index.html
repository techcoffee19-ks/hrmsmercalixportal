<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Master Gateway | Mercalix OS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-cyan: #00d4ff;
            --dark-blue: #002b3d;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --accent-glow: rgba(0, 212, 255, 0.3);
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a; 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #002b3d 0%, #0f172a 100%);
            z-index: -1;
        }

        .login-container {
            position: relative; z-index: 10;
            width: 1000px; height: 620px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: flex; overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            animation: fadeInUp 1s ease-out;
        }

        .left-art {
            flex: 1.4;
            position: relative;
            background: url('https://img.freepik.com/free-vector/cyber-security-concept_23-2148532223.jpg?w=1380&t=st=1713682944~exp=1713683544~hmac=98e5e317f2a1a7f7f9e8e6f1f2e1e1e1') no-repeat center center;
            background-size: cover;
        }
        .left-art::before {
            content: ""; position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(135deg, rgba(0, 43, 61, 0.4), rgba(0, 78, 146, 0.7));
        }

        .logo-box {
            position: absolute; top: 40px; left: 40px; z-index: 15;
        }
        .logo-box img {
            height: 45px; background: white; padding: 10px 18px; border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .form-panel {
            flex: 0.85;
            background: #ffffff;
            padding: 60px;
            display: flex; flex-direction: column; justify-content: center;
            border-radius: 0 30px 30px 0;
        }

        .form-header { margin-bottom: 40px; text-align: left; }
        .form-header h2 { font-size: 28px; font-weight: 800; color: #1e293b; margin: 0; }
        .form-header h2 span { color: var(--primary-cyan); }
        .form-header p { font-size: 14px; color: var(--text-gray); margin-top: 5px; font-weight: 500; }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 12px; font-weight: 800; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; }

        .input-wrapper { position: relative; }
        .input-group input {
            width: 100%; padding: 16px 20px; border: 2px solid #f1f5f9; 
            border-radius: 15px; font-size: 15px; outline: none; 
            box-sizing: border-box; transition: all 0.4s ease; 
            background: #f8fafc; font-weight: 600;
        }

        .input-group input:focus { 
            border-color: var(--primary-cyan); 
            background: #fff; 
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateX(5px);
        }
        
        .input-wrapper i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #cbd5e1; font-size: 18px; cursor: pointer; }

        .login-btn {
            width: 100%; padding: 18px; background: var(--dark-blue);
            color: white; border: none; border-radius: 15px;
            font-size: 16px; font-weight: 800; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0, 43, 61, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .login-btn:hover { background: var(--primary-cyan); color: #002b3d; transform: scale(1.02); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .sys-badge { position: absolute; bottom: 20px; right: 40px; font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="login-container">
        <div class="left-art">
            <div class="logo-box">
                <img src="https://api.pay2india.com/uploads/files/setting/logo1765020086879.jpeg" alt="Mercalix Logo">
            </div>
        </div>

        <div class="form-panel">
            <div class="form-header animate__animated animate__fadeIn">
                <h2>SECURE <span>GATEWAY</span></h2>
                <p>Welcome, Authenticate your session to access Mercalix OS.</p>
            </div>

            <div class="input-group">
                <label>Admin ID</label>
                <div class="input-wrapper">
                    <input type="text" id="adminUser" placeholder="Username" autocomplete="off">
                </div>
            </div>

            <div class="input-group">
                <label>Neural Key</label>
                <div class="input-wrapper">
                    <input type="password" id="adminPass" placeholder="••••••••">
                    <i class="far fa-eye-slash" id="toggleIcon" onclick="togglePassword()"></i>
                </div>
            </div>

            <button class="login-btn" id="loginBtn" onclick="adminLogin()">Authorize Session 🔒</button>

            <div style="text-align:center; margin-top:30px; font-size:12px; color:var(--text-gray);">
                System Issues? <a href="#" style="color:var(--dark-blue); font-weight:800; text-decoration:none;">Support Center</a>
            </div>
        </div>
    </div>

<a href="terminal_broadcast.html" class="sys-badge" style="text-decoration: none; cursor: pointer; transition: color 0.2s;">
    Drop A message To employee hrms portal
</a>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCkBeHploRe3UHq6ndukFUtfYc8sCkfx9g",
          authDomain: "hrmsmercalixportal.firebaseapp.com",
          projectId: "hrmsmercalixportal",
          storageBucket: "hrmsmercalixportal.firebasestorage.app",
          messagingSenderId: "126979860674",
          appId: "1:126979860674:web:f486ad4b470b59189c735b",
          measurementId: "G-EM1HY6T4NF"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Clear any old session immediately on load
        sessionStorage.clear();

        function togglePassword() {
            const p = document.getElementById("adminPass");
            const icon = document.getElementById("toggleIcon");
            if (p.type === "password") {
                p.type = "text";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            } else {
                p.type = "password";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            }
        }

        async function adminLogin() {
    const user = document.getElementById("adminUser").value.trim(); 
    const pass = document.getElementById("adminPass").value.trim();
    const btn = document.getElementById("loginBtn");
    
    if (!user || !pass) { alert("Credentials required!"); return; }
    
    btn.innerText = "AUTHENTICATING...";
    btn.disabled = true;

    try {
        const doc = await db.collection("admins").doc(user).get();

        if (doc.exists) {
            const data = doc.data();
            
            if (data.password === pass) {
                // 1. BASIC SESSION SETUP
                sessionStorage.setItem("isLoggedIn", "true");
                sessionStorage.setItem("adminID", user);
                sessionStorage.setItem("adminName", data.name || "Administrator");
                sessionStorage.setItem("companyCode", data.companyCode || "GENERAL"); 
                
                const role = data.userRole || data.role_key || data.role || "staff";
                sessionStorage.setItem("userRole", role);
                sessionStorage.setItem("userBranch", data.branch || "All");
                sessionStorage.setItem("adminDesignation", data.designation || role.toUpperCase());

                // 2. PERMISSIONS SYNC (Directly from admins collection or role_permissions)
                // Hum pehle admin doc se uthayenge, agar wahan nahi hai toh role Doc se
                let finalPermissions = data.permissions || {};
                
                if (Object.keys(finalPermissions).length === 0) {
                    const activeCC = data.companyCode || "GENERAL";
                    // Role key mapping for document ID
                    const roleKey = role.toLowerCase().replace(" ", "_");
                    const roleDoc = await db.collection("role_permissions").doc(`${activeCC}_${roleKey}`).get();
                    if(roleDoc.exists) {
                        finalPermissions = roleDoc.data();
                    }
                }
                sessionStorage.setItem("userPermissions", JSON.stringify(finalPermissions));
                
                btn.innerText = "ACCESS GRANTED";
                btn.style.background = "#10b981";
                
                // 3. ROLE-BASED REDIRECTION (UPDATED)
                setTimeout(() => {
                    const normalizedRole = role.toLowerCase();
                    
                    // Super Admin aur Main Admin Global Dashboard jayenge
                    if (normalizedRole === "super_admin" || normalizedRole === "main admin") {
                        window.location.replace("home_page.html");
                    } 
                    // HR Admin aur Reporting Manager Branch Dashboard jayenge
                    else if (normalizedRole === "hr_admin" || normalizedRole === "reporting manager" || normalizedRole === "branch_admin") {
                        window.location.replace("branch_dashboard.html");
                    } 
                    // Default redirect
                    else {
                        window.location.replace("branch_dashboard.html");
                    }
                }, 800);

            } else {
                alert("❌ Access Denied: Neural Key Mismatch.");
                resetBtn();
            }
        } else {
            alert("❌ Access Denied: Admin ID not registered.");
            resetBtn();
        }
    } catch (e) {
        console.error("Login Error:", e);
        alert("⚠️ Connection Error. System not responding.");
        resetBtn();
    }
}

        function resetBtn() {
            const btn = document.getElementById("loginBtn");
            btn.innerText = "Authorize Session 🔒";
            btn.style.background = "#002b3d";
            btn.disabled = false;
        }

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') adminLogin(); });
    </script>
</body>
</html>
