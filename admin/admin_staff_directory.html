<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Staff Directory | Mercalix Enterprise</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const adminCC = sessionStorage.getItem("companyCode");

        function checkAdminAccess() {
            const isLoggedIn = sessionStorage.getItem("isLoggedIn");
            if (!isLoggedIn || isLoggedIn !== "true") { 
                window.location.href = "index.html"; 
            }
        }
        checkAdminAccess();
        function logout() { sessionStorage.clear(); window.location.href = "index.html"; }

        function toggleDrop(btn) {
            const dropdown = btn.nextElementSibling;
            document.querySelectorAll('.dropdown-container').forEach(dd => { if(dd !== dropdown) dd.style.display = 'none'; });
            if(dropdown) {
                dropdown.style.display = (dropdown.style.display === "block") ? "none" : "block";
            }
        }

        // ─── 🔐 MULTI-ROLE SECURITY SIDEBAR ENGINE ───
        function applyRoleBasedSidebar() {
            const bossSection = document.getElementById("bossAccessSection");
            const hrSection = document.getElementById("hrAccessSection");
            const roleBadge = document.getElementById("roleBadgeDisplay");

            // URL parsing criteria strings
            const urlParams = new URLSearchParams(window.location.search);
            const portalType = urlParams.get('portal'); 

            let storedRole = String(sessionStorage.getItem("userRole") || "").toUpperCase();
            let storedName = String(sessionStorage.getItem("adminName") || "").toUpperCase();

            // STEP 1: HR Logic matching execution patterns (Nisha login parameters included)
            if (portalType === "hr" || storedName.includes("NISHA") || storedRole.includes("HR") || storedName.includes("UTTAM")) {
                
                // Force state class inject mechanism to bind pure hidden element rules
                document.body.classList.add("hr-logged-in");
                
                if(bossSection) {
                    bossSection.style.setProperty("display", "none", "important"); 
                    bossSection.innerHTML = ""; // Destroys tree configuration elements safely
                }
                if(hrSection) hrSection.style.setProperty("display", "block", "important");
                if(roleBadge) roleBadge.innerText = "HR ADMIN PORTAL";
                
                console.log("RBAC Filter Success: Access locked under HR constraints framework.");
            } 
            // STEP 2: Boss / Administrator Purva login parameters criteria match
            else if (portalType === "boss" || storedName.includes("PURVA") || storedRole.includes("BOSS") || storedRole.includes("ADMIN")) {
                document.body.classList.remove("hr-logged-in");
                if(bossSection) bossSection.style.setProperty("display", "block", "important");
                if(hrSection) hrSection.style.setProperty("display", "block", "important");
                if(roleBadge) roleBadge.innerText = "MAIN ADMIN (BOSS)";
                
                console.log("RBAC Filter Success: System access authority verified.");
            } 
            // Fallback parameters matrix
            else {
                if(bossSection) bossSection.style.setProperty("display", "none", "important");
                if(hrSection) hrSection.style.setProperty("display", "block", "important");
            }
        }
    </script>

    <style>
        :root { --primary: #ffb100; --dark: #1e293b; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --info: #3b82f6; --bg: #f1f5f9; --border: #e2e8f0; --neon: #00d4ff; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--dark); overflow-x: hidden; }
        
        .top-nav { width: 100%; padding: 0 20px; height: 70px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000; box-sizing: border-box; }
        .logo-text { font-size: 18px; font-weight: 800; color: var(--dark); text-decoration: none; text-transform: uppercase; }
        .logo-text span { color: var(--primary); }

        .container { display: flex; flex: 1; min-height: calc(100vh - 70px); }
        
        .sidebar { width: 250px; background: var(--dark); flex-shrink: 0; display: flex; flex-direction: column; }
        .nav-links { display: flex; flex-direction: column; padding-top: 10px; flex-grow: 1; }
        .menu-item, .dropdown-btn { padding: 15px 20px; color: #cbd5e1; font-weight: 600; font-size: 11px; text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; border-left: 4px solid transparent; text-decoration: none; align-items: center; background: none; border: none; width: 100%; box-sizing: border-box; outline: none; }
        .menu-item:hover, .menu-item.active, .dropdown-btn:hover { background: rgba(255,177,0,0.1); color: var(--primary); border-left-color: var(--primary); border-top: none; border-bottom: none; border-right: none;}
        .dropdown-container { display: none; background: #111827; width: 100%; }
        .dropdown-container a { padding: 12px 20px 12px 45px; color: #94a3b8; font-size: 10px; display: block; text-decoration: none; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.02); }

        .main { flex: 1; padding: 25px; box-sizing: border-box; }
        
        .directory-header { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; }
        .search-filters { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .search-filters input, .search-filters select { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 13px; outline: none; background: #f8fafc; }
        .search-box { flex: 1; min-width: 250px; }

        .alphabet-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .alpha-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: #fff; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .alpha-btn:hover, .alpha-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .directory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .emp-card { background: white; border-radius: 10px; padding: 20px; border: 1.5px solid #e2e8f0; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .emp-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        .profile-wrapper { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; color: white; background: var(--dark); border: 3px solid #f1f5f9; overflow: hidden; }
        .profile-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .emp-name-tag { font-size: 14px; font-weight: 800; margin: 0; color: var(--dark); }
        .emp-info-tag { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; margin: 4px 0; }
        .status-dot { position: absolute; top: 12px; right: 12px; width: 10px; height: 10px; border-radius: 50%; }
        
        .badge-role { font-size: 10px; font-weight: 800; background: #f8fafc; color: var(--info); padding: 4px 12px; border-radius: 20px; text-transform: uppercase; border: 1px solid var(--border); }

        /* ─── 🛑 CRITICAL STYLESHEET FORCE SYSTEM OVERRIDE METHOD ─── */
        body.hr-logged-in #bossAccessSection,
        body.hr-logged-in .sidebar > .nav-links > div:first-of-type,
        body.hr-logged-in .nav-links div:first-child {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            height: 0 !important;
            overflow: hidden !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body onload="initDirectory()">

<nav class="top-nav">
    <a href="home_page.html" class="logo-text">MERCALIX <span>ENTERPRISE</span></a>
    <div style="display:flex; align-items:center; gap:20px;">
        <span class="badge-role" id="roleBadgeDisplay">SECURE PROFILER</span>
        <div id="liveClock" style="font-size: 12px; font-weight: 900; background: #334155; color: white; padding: 6px 15px; border-radius: 30px;">00:00:00</div>
        <div style="width:40px; height:40px; border-radius:50%; background:var(--dark); color:var(--primary); display:flex; align-items:center; justify-content:center; font-weight:900; border:2px solid var(--primary);" id="avatarBadge">A</div>
    </div>
</nav>

<div class="container">
    <aside class="sidebar">
        <div class="nav-links">
            <a href="home_page.html" class="menu-item">📊 Global Dashboard</a>
            
            <div id="bossAccessSection" style="display: none;">
                <div class="dropdown-btn" onclick="toggleDrop(this)">🔐 System Access <span>▼</span></div>
                <div class="dropdown-container">
                    <a href="admin_create_login.html">Create New Login</a>
                    <a href="admin_org_master.html">Create Department</a>
                    <a href="admin_manage_roles.html">Manage Roles</a>
                </div>
            </div>

            <div id="hrAccessSection" style="display: block;">
                <div class="dropdown-btn active" onclick="toggleDrop(this)">👥 Workforce <span>▼</span></div>
                <div class="dropdown-container" style="display: block;">
                    <a href="admin_kyc_verify.html">KYC Verification</a>
                    <a href="admin_staff_directory.html" style="color: var(--primary);">Master Directory</a>
                </div>
                <div class="dropdown-btn" onclick="toggleDrop(this)">💰 Enterprise Payroll <span>▼</span></div>
                <div class="dropdown-container">
                    <a href="admin_salary_register.html">Salary Register</a>
                </div>
                <a href="admin_attendance_master.html" class="menu-item">📈 Global Attendance</a>
                <a href="admin_performance_review.html" class="menu-item">📈 Staff Audit</a>
            </div>

        </div>
        <div style="padding: 20px; border-top: 1px solid #334155; margin-top: auto;">
            <a onclick="logout()" style="color:var(--primary); cursor:pointer; font-weight:800; font-size:11px; text-decoration:none;">🔓 SECURE LOGOUT</a>
        </div>
    </aside>

    <main class="main">
        <div class="directory-header">
            <div class="search-filters">
                <input type="text" id="staffSearch" class="search-box" placeholder="Search by Name, Dept, or ID..." oninput="filterStaff()">
                <select id="branchFilter" onchange="filterStaff()" class="filter-select" style="width: 180px;"><option value="All">🌐 All Branches</option></select>
                <select id="deptFilter" onchange="filterStaff()" class="filter-select" style="width: 180px;">
                    <option value="All">🏢 All Depts</option>
                </select>
            </div>
            <div class="alphabet-bar" id="alphaBar">
                <button class="alpha-btn active" onclick="filterAlpha('ALL', this)">ALL</button>
            </div>
        </div>
        <div class="directory-grid" id="staffGrid"></div>
    </main>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCkBeHploRe3UHq6ndukFUtfYc8sCkfx9g",
  authDomain: "hrmsmercalixportal.firebaseapp.com",
  projectId: "hrmsmercalixportal",
  storageBucket: "hrmsmercalixportal.firebasestorage.app",
  messagingSenderId: "126979860674",
  appId: "1:126979860674:web:f486ad4b470b59189c735b",
  measurementId: "G-EM1HY6T4NF"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let masterList = [];

function initDirectory() {
    applyRoleBasedSidebar();

    setInterval(() => { document.getElementById("liveClock").innerText = new Date().toLocaleTimeString(); }, 1000);
    
    const adminUserHandleName = sessionStorage.getItem("adminName") || "A";
    document.getElementById("avatarBadge").innerText = adminUserHandleName.charAt(0).toUpperCase();

    generateAlpha();
    syncBranches();
    syncDepts();
    loadStaff();
}

function generateAlpha() {
    const bar = document.getElementById("alphaBar");
    for(let i=65; i<=90; i++){
        const char = String.fromCharCode(i);
        bar.innerHTML += `<button class="alpha-btn" onclick="filterAlpha('${char}', this)">${char}</button>`;
    }
}

function syncBranches() {
    const sel = document.getElementById("branchFilter");
    let query = db.collection("branches");
    if(adminCC) query = query.where("companyCode", "==", adminCC);
    query.onSnapshot(s => {
        sel.innerHTML = '<option value="All">🌐 All Branches</option>';
        s.forEach(doc => sel.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
    });
}

function syncDepts() {
    const sel = document.getElementById("deptFilter");
    let query = db.collection("org_structure");
    if(adminCC) query = query.where("companyCode", "==", adminCC);
    query.onSnapshot(s => {
        sel.innerHTML = '<option value="All">🏢 All Depts</option>';
        s.forEach(doc => sel.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
    });
}

function loadStaff() {
    db.collection("employees").onSnapshot(snap => {
        masterList = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderCards(masterList);
    });
}

function getInitials(name) {
    if(!name) return "MX";
    let parts = name.trim().split(" ");
    return parts.length > 1 ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase() : parts[0][0].toUpperCase();
}

function renderCards(list) {
    const grid = document.getElementById("staffGrid");
    grid.innerHTML = list.length === 0 ? `<div style="grid-column:1/-1; text-align:center; padding:50px; color:#94a3b8;">No employees found for this company.</div>` : "";
    list.forEach(emp => {
        const initials = getInitials(emp.name);
        const photoUrl = emp.kyc?.passport_photo_url || emp.profilePhotoUrl || emp.general?.profilephoto;
        const photo = photoUrl ? `<img src="${photoUrl}">` : initials;
        const statusColor = emp.status === 'Active' ? 'var(--success)' : 'var(--danger)';

        grid.innerHTML += `
            <div class="emp-card" onclick="openProfile('${emp.id}')">
                <div class="status-dot" style="background:${statusColor}"></div>
                <div class="profile-wrapper">${photo}</div>
                <p class="emp-name-tag">${emp.name}</p>
                <p class="emp-info-tag">${emp.designation || 'Staff'}</p>
                <p style="font-size:10px; color:var(--primary); font-weight:800;">${emp.id}</p>
                <p style="font-size:9px; color:#94a3b8; margin-top:5px;">📍 ${emp.branch || 'N/A'} | ${emp.dept || 'General'}</p>
            </div>`;
    });
}

function filterStaff() {
    const search = document.getElementById("staffSearch").value.toLowerCase();
    const branch = document.getElementById("branchFilter").value;
    const dept = document.getElementById("deptFilter").value;
    const filtered = masterList.filter(e => 
        (e.name.toLowerCase().includes(search) || e.id.toLowerCase().includes(search) || (e.dept && e.dept.toLowerCase().includes(search))) &&
        (branch === "All" || e.branch === branch) &&
        (dept === "All" || e.dept === dept)
    );
    renderCards(filtered);
}

function filterAlpha(char, btn) {
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if(char === 'ALL') return renderCards(masterList);
    const filtered = masterList.filter(e => e.name.toUpperCase().startsWith(char));
    renderCards(filtered);
}

function openProfile(id) {
    const urlParams = new URLSearchParams(window.location.search);
    const pType = urlParams.get('portal') || 'hr';
    window.location.href = `admin_view_employee.html?empId=${id}&portal=${pType}`;
}
</script>
</body>
</html>
